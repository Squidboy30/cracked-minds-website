<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boltwork — Live Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0b;--surface:#141412;--surface2:#1c1c19;--surface3:#242420;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8e4dc;--text2:#7a7870;--text3:#4a4844;
  --gold:#f5a623;--green:#22c55e;--red:#ef4444;--blue:#60a5fa;--amber:#fbbf24;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{font-family:var(--mono);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-family:var(--sans);font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
.logo-bolt{color:var(--gold)}
.header-right{display:flex;align-items:center;gap:16px}
.last-update{font-size:11px;color:var(--text3)}
.refresh-btn{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:4px;cursor:pointer;transition:all 0.15s}
.refresh-btn:hover{color:var(--text);border-color:var(--gold)}
.refresh-btn.loading{color:var(--gold);border-color:var(--gold)}
.main{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:1400px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;position:relative}
.card.span2{grid-column:span 2}
.card.span3{grid-column:span 3}
.card-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-weight:500}
.metric-big{font-family:var(--sans);font-size:32px;font-weight:600;line-height:1;margin-bottom:4px}
.metric-sub{font-size:11px;color:var(--text2)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.status-ok{background:var(--green)}
.status-down{background:var(--red)}
.status-degraded{background:var(--amber)}
.status-unknown{background:var(--text3)}
.health-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.health-row:last-child{border-bottom:none}
.health-name{flex:1;color:var(--text2)}
.health-status{font-weight:500}
.health-latency{font-size:11px;color:var(--text3);margin-left:auto}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-item{background:var(--surface2);border-radius:4px;padding:10px 12px}
.stat-val{font-family:var(--sans);font-size:20px;font-weight:600;color:var(--text)}
.stat-label{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em}
.log-list{display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto}
.log-item{display:flex;gap:8px;padding:5px 8px;border-radius:3px;background:var(--surface2);font-size:11px;align-items:flex-start}
.log-ts{color:var(--text3);flex-shrink:0;width:56px}
.log-method{color:var(--gold);flex-shrink:0;width:40px}
.log-path{color:var(--blue);flex:1;word-break:break-all}
.log-ua{color:var(--text3);font-size:10px;flex-shrink:0;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-list{display:flex;flex-direction:column;gap:4px}
.ep-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface2);border-radius:3px}
.ep-name{flex:1;color:var(--text2);font-size:11px}
.ep-calls{color:var(--text);font-weight:500;width:32px;text-align:right}
.ep-bar-wrap{flex:2;height:4px;background:var(--surface3);border-radius:2px}
.ep-bar{height:4px;background:var(--gold);border-radius:2px;transition:width 0.4s}
.ep-success{color:var(--green);font-size:10px;width:28px;text-align:right}
.ep-error{color:var(--red);font-size:10px;width:28px;text-align:right}
.token-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;border-radius:4px;outline:none;margin-bottom:12px}
.token-input:focus{border-color:var(--gold)}
.error-banner{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:10px 14px;border-radius:4px;font-size:12px;margin-bottom:12px;display:none}
.no-data{color:var(--text3);font-size:12px;text-align:center;padding:24px}
.pulse{animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
/* Channel bar */
.chan-bar-wrap{width:100%;height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;margin:6px 0 2px}
.chan-bar-local{height:8px;background:var(--gold);border-radius:4px 0 0 4px;display:inline-block;float:left}
.chan-bar-remote{height:8px;background:var(--green);display:inline-block;float:left}
.chan-row{padding:10px 0;border-bottom:1px solid var(--border)}
.chan-row:last-child{border-bottom:none}
.chan-peer{font-size:12px;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.chan-stats{display:flex;gap:16px;font-size:11px;color:var(--text2)}
.chan-stat{display:flex;flex-direction:column;gap:1px}
.chan-stat-val{color:var(--text);font-weight:500}
.section-divider{grid-column:span 3;border-top:1px solid var(--border);margin:4px 0;display:flex;align-items:center;gap:12px;padding-top:4px}
.section-divider-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
@media(max-width:900px){.main{grid-template-columns:1fr 1fr}.card.span3{grid-column:span 2}.section-divider{grid-column:span 2}}
@media(max-width:600px){.main{grid-template-columns:1fr}.card.span2,.card.span3{grid-column:span 1}.section-divider{grid-column:span 1}}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-bolt">⚡</span> Boltwork Dashboard</div>
  <div class="header-right">
    <span class="last-update" id="last-update">–</span>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">↻ Refresh</button>
  </div>
</header>

<div style="padding:16px 24px;max-width:1400px;margin:0 auto">
  <div id="error-banner" class="error-banner"></div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
    <input type="password" class="token-input" id="token-input" placeholder="Admin token..." style="max-width:320px;margin:0"
      onchange="localStorage.setItem('bw_admin_token',this.value);fetchAll()">
    <span style="font-size:11px;color:var(--text3)">Token is saved locally</span>
  </div>
</div>

<div class="main" id="dashboard">

  <!-- Health -->
  <div class="card">
    <div class="card-label">Service health</div>
    <div id="health-content"><div class="no-data pulse">Loading...</div></div>
  </div>

  <!-- Invoice stats -->
  <div class="card">
    <div class="card-label">Payments</div>
    <div id="invoice-content"><div class="no-data pulse">Loading...</div></div>
  </div>

  <!-- API calls -->
  <div class="card">
    <div class="card-label">API calls (last hour)</div>
    <div id="calls-content"><div class="no-data pulse">Loading...</div></div>
  </div>

  <!-- Section divider -->
  <div class="section-divider">
    <span class="section-divider-label">⚡ Lightning Node</span>
  </div>

  <!-- Node status -->
  <div class="card">
    <div class="card-label">Node status</div>
    <div id="node-content"><div class="no-data pulse">Loading...</div></div>
  </div>

  <!-- Channels -->
  <div class="card span2">
    <div class="card-label">Channels</div>
    <div id="channels-content"><div class="no-data pulse">Loading...</div></div>
  </div>

  <!-- Section divider -->
  <div class="section-divider">
    <span class="section-divider-label">Gateway activity</span>
  </div>

  <!-- Gateway requests -->
  <div class="card span2">
    <div class="card-label">Live gateway requests</div>
    <div id="requests-content"><div class="no-data pulse">Loading...</div></div>
  </div>

  <!-- Endpoint breakdown -->
  <div class="card">
    <div class="card-label">Endpoint activity</div>
    <div id="endpoints-content"><div class="no-data pulse">Loading...</div></div>
  </div>

  <!-- Recent API activity -->
  <div class="card span3">
    <div class="card-label">Recent API calls</div>
    <div id="recent-content"><div class="no-data pulse">Loading...</div></div>
  </div>

</div>

<script>
const API     = 'https://parsebit.fly.dev/admin/metrics';
const LND_API = 'https://parsebit.fly.dev/admin/lnd';
let autoRefresh;

function getToken() {
  return document.getElementById('token-input').value ||
         localStorage.getItem('bw_admin_token') || '';
}

function statusDot(status) {
  const cls = status === 'ok' ? 'status-ok' : status === 'down' ? 'status-down' : 'status-degraded';
  return `<span class="status-dot ${cls}"></span>`;
}

function fmtTime(ts) {
  if (!ts) return '–';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch { return ts.slice(11,19) || '–'; }
}

function fmtSats(n) {
  if (!n) return '0';
  return Number(n).toLocaleString();
}

function fmtPath(path) { return path || '/'; }

async function fetchAll() {
  const token = getToken();
  if (!token) {
    document.getElementById('error-banner').textContent = 'Enter your admin token above to view metrics.';
    document.getElementById('error-banner').style.display = 'block';
    return;
  }

  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '↻ Loading...';

  try {
    const [metricsRes, lndRes] = await Promise.all([
      fetch(API,     { headers: { 'X-Admin-Token': token } }),
      fetch(LND_API, { headers: { 'X-Admin-Token': token } })
    ]);

    if (metricsRes.status === 403) {
      document.getElementById('error-banner').textContent = 'Invalid admin token.';
      document.getElementById('error-banner').style.display = 'block';
      return;
    }

    document.getElementById('error-banner').style.display = 'none';
    const data = await metricsRes.json();
    const lnd  = lndRes.ok ? await lndRes.json() : null;
    render(data, lnd);
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB');

  } catch(e) {
    document.getElementById('error-banner').textContent = 'Failed to fetch metrics: ' + e.message;
    document.getElementById('error-banner').style.display = 'block';
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '↻ Refresh';
  }
}

function render(d, lnd) {
  // Health
  const gw  = d.health?.gateway || {};
  const api = d.health?.api || {};
  document.getElementById('health-content').innerHTML = `
    <div class="health-row">
      ${statusDot(gw.status)}<span class="health-name">L402 Gateway</span>
      <span class="health-status" style="color:${gw.status==='ok'?'var(--green)':gw.status==='down'?'var(--red)':'var(--amber)'}">${gw.status||'–'}</span>
      ${gw.latency_ms ? `<span class="health-latency">${gw.latency_ms}ms</span>` : ''}
    </div>
    <div class="health-row">
      ${statusDot(api.status)}<span class="health-name">Parsebit API</span>
      <span class="health-status" style="color:${api.status==='ok'?'var(--green)':api.status==='down'?'var(--red)':'var(--amber)'}">${api.status||'–'}</span>
      ${api.latency_ms ? `<span class="health-latency">${api.latency_ms}ms</span>` : ''}
    </div>
    <div class="health-row">
      ${statusDot(d.fly_logs_available?'ok':'degraded')}<span class="health-name">Fly logs</span>
      <span class="health-status" style="color:${d.fly_logs_available?'var(--green)':'var(--amber)'}">${d.fly_logs_available?'available':'no token'}</span>
    </div>
  `;

  // Invoices
  const inv = d.invoices || {};
  document.getElementById('invoice-content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-item">
        <div class="stat-val" style="color:var(--green)">${inv.settled||0}</div>
        <div class="stat-label">Settled</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" style="color:var(--gold)">${fmtSats(inv.total_sats)}</div>
        <div class="stat-label">Total sats</div>
      </div>
    </div>
  `;

  // API calls
  const bw = d.boltwork || {};
  document.getElementById('calls-content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-item">
        <div class="stat-val">${bw.total_calls||0}</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" style="color:var(--green)">${bw.success_calls||0}</div>
        <div class="stat-label">Success</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" style="color:var(--red)">${bw.error_calls||0}</div>
        <div class="stat-label">Errors</div>
      </div>
      <div class="stat-item">
        <div class="stat-val">${d.aperture?.total_requests||0}</div>
        <div class="stat-label">402 issued</div>
      </div>
    </div>
  `;

  // LND Node status
  if (!lnd) {
    document.getElementById('node-content').innerHTML = '<div class="no-data">LND data unavailable</div>';
    document.getElementById('channels-content').innerHTML = '<div class="no-data">LND data unavailable</div>';
  } else {
    const nodeStatus = lnd.synced ? 'ok' : 'degraded';
    document.getElementById('node-content').innerHTML = `
      <div class="health-row">
        ${statusDot(nodeStatus)}
        <span class="health-name">Node</span>
        <span class="health-status" style="color:${lnd.synced?'var(--green)':'var(--amber)'}">${lnd.synced?'synced':'syncing'}</span>
      </div>
      <div class="health-row">
        ${statusDot(lnd.active_channels > 0 ? 'ok' : 'down')}
        <span class="health-name">Active channels</span>
        <span class="health-status" style="color:${lnd.active_channels>0?'var(--green)':'var(--red)'}">${lnd.active_channels||0}</span>
      </div>
      <div class="health-row">
        ${statusDot(lnd.num_peers > 0 ? 'ok' : 'degraded')}
        <span class="health-name">Peers</span>
        <span class="health-status">${lnd.num_peers||0}</span>
      </div>
      <div class="health-row">
        <span class="status-dot status-unknown"></span>
        <span class="health-name">Block height</span>
        <span class="health-status" style="color:var(--text2)">${(lnd.block_height||0).toLocaleString()}</span>
      </div>
      <div class="health-row">
        <span class="status-dot" style="background:var(--gold)"></span>
        <span class="health-name">Alias</span>
        <span class="health-status" style="color:var(--gold)">${lnd.alias||'–'}</span>
      </div>
    `;

    // Channels
    const channels = lnd.channels || [];
    if (channels.length === 0) {
      document.getElementById('channels-content').innerHTML = '<div class="no-data">No channels</div>';
    } else {
      const totalInbound  = channels.reduce((s,c) => s + (c.remote_balance||0), 0);
      const totalOutbound = channels.reduce((s,c) => s + (c.local_balance||0), 0);
      const totalCapacity = channels.reduce((s,c) => s + (c.capacity||0), 0);

      document.getElementById('channels-content').innerHTML = `
        <div class="stat-grid" style="margin-bottom:14px">
          <div class="stat-item">
            <div class="stat-val" style="color:var(--green)">${fmtSats(totalInbound)}</div>
            <div class="stat-label">Inbound (sats)</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" style="color:var(--gold)">${fmtSats(totalOutbound)}</div>
            <div class="stat-label">Outbound (sats)</div>
          </div>
        </div>
        ${channels.map(ch => {
          const cap    = ch.capacity || 1;
          const localPct  = Math.round((ch.local_balance||0) / cap * 100);
          const remotePct = Math.round((ch.remote_balance||0) / cap * 100);
          const active = ch.active;
          return `
            <div class="chan-row">
              <div class="chan-peer">
                <span class="status-dot ${active?'status-ok':'status-down'}"></span>
                <strong>${ch.peer_alias||ch.remote_pubkey?.slice(0,16)+'...'}</strong>
                <span style="font-size:10px;color:var(--text3)">${fmtSats(cap)} sats</span>
              </div>
              <div class="chan-bar-wrap" style="overflow:hidden">
                <div class="chan-bar-local"  style="width:${localPct}%"></div>
                <div class="chan-bar-remote" style="width:${remotePct}%"></div>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:2px">
                <span style="color:var(--gold)">out: ${fmtSats(ch.local_balance)}</span>
                <span style="color:var(--green)">in: ${fmtSats(ch.remote_balance)}</span>
              </div>
            </div>
          `;
        }).join('')}
      `;
    }
  }

  // Gateway requests
  const reqs = (d.aperture?.recent_requests || []).slice().reverse();
  if (reqs.length === 0) {
    document.getElementById('requests-content').innerHTML = '<div class="no-data">No requests yet</div>';
  } else {
    document.getElementById('requests-content').innerHTML = `
      <div class="log-list">
        ${reqs.map(r => `
          <div class="log-item">
            <span class="log-ts">${fmtTime(r.ts)}</span>
            <span class="log-method">${r.method||'?'}</span>
            <span class="log-path">${fmtPath(r.path)}</span>
            <span class="log-ua" title="${r.user_agent||''}">${r.user_agent||'–'}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  // Endpoints
  const eps = bw.by_endpoint || {};
  const maxCalls = Math.max(1, ...Object.values(eps).map(e => e.calls));
  const epEntries = Object.entries(eps).sort((a,b) => b[1].calls - a[1].calls);
  if (epEntries.length === 0) {
    document.getElementById('endpoints-content').innerHTML = '<div class="no-data">No API calls yet</div>';
  } else {
    document.getElementById('endpoints-content').innerHTML = `
      <div class="ep-list">
        ${epEntries.map(([ep, stats]) => `
          <div class="ep-row">
            <span class="ep-name">${ep}</span>
            <span class="ep-calls">${stats.calls}</span>
            <div class="ep-bar-wrap"><div class="ep-bar" style="width:${Math.round(stats.calls/maxCalls*100)}%"></div></div>
            <span class="ep-success">✓${stats.success||0}</span>
            <span class="ep-error">${stats.errors>0?'✗'+stats.errors:''}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  // Recent API calls
  const recent = (bw.recent || []).slice().reverse();
  if (recent.length === 0) {
    document.getElementById('recent-content').innerHTML = '<div class="no-data">No API calls in logs yet — check FLY_API_TOKEN is set</div>';
  } else {
    document.getElementById('recent-content').innerHTML = `
      <div class="log-list">
        ${recent.map(r => `
          <div class="log-item">
            <span class="log-ts">${fmtTime(r.ts)}</span>
            <span class="log-method" style="color:${r.status==='success'?'var(--green)':r.status==='error'?'var(--red)':'var(--text2)'}">${r.status||'?'}</span>
            <span class="log-path">${r.endpoint||'–'}</span>
            <span class="log-ua">${r.duration_ms?r.duration_ms+'ms':''}</span>
          </div>
        `).join('')}
      </div>
    `;
  }
}

// Init
window.addEventListener('load', () => {
  const saved = localStorage.getItem('bw_admin_token');
  if (saved) document.getElementById('token-input').value = saved;
  fetchAll();
  autoRefresh = setInterval(fetchAll, 30000);
});
</script>
</body>
</html>
